name: GitLab Contribution Graph

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 2am UTC
  workflow_dispatch:        # lets you trigger manually

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVG
        env:
          GITLAB_USERNAME: dking08
        run: python scripts/gitlab_graph.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/gitlab-contributions.svg
          git diff --staged --quiet || git commit -m "chore: update GitLab contribution graph"
          git push
