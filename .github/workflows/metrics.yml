name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"  # runs daily
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITLAB_TOKEN }}
          filename: gitlab-metrics.svg
          user: dking08
          base: activity
          config_display: columns
